<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Formatando String</title>
  <style>
    body{
      background-color: dimgrey;
      color: lightsteelblue;
      font: 20pt Arial;
    }
  </style>
</head>
<body>
  <h1>Olá</h1>
  <script>
    const nome = window.prompt("Digite seu nome: ")
    document.write(`Olá, <strong>${nome}!</strong> Seu nome tem ${nome.length} letras.<br>`)
    document.write(`Seu nome em maiuscula fica ${nome.toUpperCase()}.<br>`) 
    document.write(`Seu nome me minuscula fica ${nome.toLowerCase()}.`)
  </script>
</body>
</html>
