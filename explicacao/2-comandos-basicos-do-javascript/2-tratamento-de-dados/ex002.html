<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tratamento de dados</title>
  <style>
    body {
      background-color: coral;
      color: antiquewhite;
      font: 20pt Arial;
    }
  </style>
</head>
<body>
  <h1>Olá mundo!</h1>
  <script>
    const n1 = Number(prompt("Digite um numero: "))
    const n2 = Number(prompt("Digite outro numero: "))
    let soma = n1 + n2
    window.alert(`A soma do ${n1} + ${n2} = ${soma}`)
  </script>
</body>
</html>
